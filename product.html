<!DOCTYPE html>

<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>

        Detail Produk | Great Creative Studio

    </title>

    <link
    rel="stylesheet"
    href="style.css">

    <link
    rel="icon"
    href="images/logo.png">

</head>

<!-- ==========================================
     HEADER
========================================== -->

<header id="header">

    <nav class="container">

        <a
        href="index.html"
        class="logo">

            <img
            src="images/logo.png"
            alt="Great Logo">

            <span>

                Great

            </span>

        </a>

        <div class="menu-toggle">

            <span></span>

            <span></span>

            <span></span>

        </div>

        <ul class="nav-links">

            <li>

                <a href="index.html">

                    Beranda

                </a>

            </li>

        </ul>

    </nav>

</header>

<!-- ==========================================
     PRODUCT DETAIL
========================================== -->

<section class="product-detail">

    <div class="container">

        <div class="detail-grid">

            <div class="detail-image">

                <img
                id="productImage"
                src=""
                alt="">

            </div>

            <div class="detail-info">

                <p
                id="productCategory"
                class="category">

                </p>

                <h1
                id="productTitle">

                </h1>

                <h2
                id="productPrice">

                </h2>

                <p
                id="productDescription">

                </p>

                <ul
                id="productFeatures"
                class="features">

                </ul>

                <div class="hero-buttons">

                    <a
                    href="#"
                    class="btn">

                        Beli Sekarang

                    </a>

                    <a
                    href="index.html"
                    class="btn-outline">

                        Kembali

                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<footer>

    <div class="container">

        <div class="footer-logo">

            <img
            src="images/logo.png"
            alt="Great Logo">

            <h2>

                Great Creative Studio

            </h2>

        </div>

        <p>

            Premium Canva Templates

        </p>

        <small>

            © 2026 Great Creative Studio

        </small>

    </div>

</footer>

<script src="products.js"></script>

<script src="script.js"></script>

</body>

</html>
