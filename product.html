<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Detail Produk | Great</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header id="header">

    <nav class="container">

        <a href="#" class="logo">

        <img src="images/logo.png" alt="Great Logo">

        <span>Great</span>

        </a>

    </nav>

</header>


<section class="product-detail">

    <div class="container detail-grid">

        <div class="detail-image">

            <img id="productImage"
            src="images/work1.jpg">

        </div>


        <div class="detail-info">

            <p class="category" id="productCategory">
                Template
            </p>

            <h1 id="productTitle">
                Template Canva
            </h1>

            <h2 id="productPrice">
                Rp25.000
            </h2>

            <p id="productDescription">

                Produk digital berkualitas tinggi
                yang siap digunakan.

            </p>

            <ul class="features">

                <li>✔ Mudah diedit</li>

                <li>✔ Resolusi tinggi</li>

                <li>✔ Lifetime Update</li>

                <li>✔ Panduan PDF</li>

            </ul>

            <a href="#"
            class="buy-btn">

                Beli Sekarang

            </a>

        </div>

    </div>

</section>

<script src="products.js"></script>

<script src="script.js"></script>

</body>

</html>
